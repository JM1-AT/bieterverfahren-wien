{% extends 'base.html' %}
{% block title %}Mein Profil{% endblock %}

{% block content %}
<div class="bieter-wrap" style="max-width:640px;">

  <div class="page-heading">Mein Profil</div>
  <div class="page-sub">{{ current_user.email }}</div>

  <form method="POST" action="{{ url_for('bieter.profil') }}" style="margin-top:24px;">

    {# GRUNDDATEN #}
    <div class="card" style="margin-bottom:16px;">
      <div class="card-head"><span class="card-title">Grunddaten</span></div>
      <div style="padding:16px; display:grid; gap:12px;">
        <div class="form-group">
          <label class="form-label">Name *</label>
          <input class="form-input" type="text" name="name" value="{{ current_user.name }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Firma</label>
          <input class="form-input" type="text" name="firma" value="{{ current_user.firma or '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Firmenname (vollständig)</label>
          <input class="form-input" type="text" name="firmenname" value="{{ current_user.firmenname or '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Position / Funktion</label>
          <input class="form-input" type="text" name="position" value="{{ current_user.position or '' }}" placeholder="z.B. Geschäftsführer">
        </div>
        <div class="form-group">
          <label class="form-label">Adresse</label>
          <input class="form-input" type="text" name="adresse" value="{{ current_user.adresse or '' }}" placeholder="Straße, PLZ Ort">
        </div>
        <div class="form-group">
          <label class="form-label">Mobilnummer</label>
          <input class="form-input" type="tel" name="mobilnummer" value="{{ current_user.mobilnummer or '' }}" placeholder="+43 664 ...">
        </div>
      </div>
    </div>

    {# BENACHRICHTIGUNGEN #}
    <div class="card" style="margin-bottom:16px;">
      <div class="card-head"><span class="card-title">Benachrichtigungen</span></div>
      <div style="padding:16px; display:grid; gap:12px;">
        <label style="display:flex; align-items:center; gap:10px; font-size:12px; cursor:pointer;">
          <input type="checkbox" name="benachrichtigung_email" {{ 'checked' if current_user.benachrichtigung_email != False }}>
          <span>E-Mail <span style="color:var(--muted); font-size:11px;">(Standard)</span></span>
        </label>
        <label style="display:flex; align-items:center; gap:10px; font-size:12px; cursor:pointer;">
          <input type="checkbox" name="benachrichtigung_sms" {{ 'checked' if current_user.benachrichtigung_sms }}>
          <span>SMS <span style="color:var(--muted); font-size:11px;">(Mobilnummer erforderlich)</span></span>
        </label>
        <label style="display:flex; align-items:center; gap:10px; font-size:12px; cursor:pointer;">
          <input type="checkbox" name="benachrichtigung_push" {{ 'checked' if current_user.benachrichtigung_push }}>
          <span>Push-Benachrichtigung</span>
        </label>
      </div>
    </div>

    <button type="submit" class="btn-main" style="width:100%;">Profil speichern</button>
  </form>

  <div style="margin-top:12px; text-align:center;">
    <a href="{{ url_for('auth.passwort_aendern') }}" class="text-muted text-small">Passwort ändern →</a>
  </div>

</div>
{% endblock %}

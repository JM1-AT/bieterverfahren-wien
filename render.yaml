services:
  - type: web
    name: bieterverfahren-wien
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: FERNET_KEY
        sync: false   # Manuell in Render Dashboard setzen (gültiger Fernet-Key)
      - key: MAIL_SERVER
        sync: false   # z.B. mail.bieterverfahrenwien.at
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false   # office@bieterverfahrenwien.at
      - key: MAIL_PASSWORD
        sync: false   # E-Mail-Passwort vom Hosting-Anbieter
      - key: MAIL_DEFAULT_SENDER
        value: "office@bieterverfahrenwien.at"
